name: Flutter Native Compiler
run-name: Enterprise Build - ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: System Initialization
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Core] Allocating Secure Build Container...\"}" "${{ inputs.logUrl }}" > /dev/null || true

      - uses: actions/checkout@v4
      
      - name: Cache Build Engine (Pub & Gradle)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-build-v1
          restore-keys: |
            ${{ runner.os }}-flutter-build-

      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }

      - name: Production Keystore Vault
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Security] Verifying Production Cryptography Vault...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=Enterprise, O=AppStudio, L=Jakarta, ST=DKI, C=ID" -storepass appstudio2026 -keypass appstudio2026 > /dev/null 2>&1
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add appstudio.keystore
            git commit -m "System: Secure Vault Generated" > /dev/null 2>&1 || true
            git push origin HEAD:main > /dev/null 2>&1 || true
          fi

      - name: Prepare Workspace & Config
        env:
          ZIP_B64: ${{ inputs.projectZip }}
          USER_PKG: ${{ inputs.packageName }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Source] Fetching and provisioning workspace...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          echo "$ZIP_B64" | base64 -d -i > project.zip
          unzip -q -o project.zip -d app/
          cd app
          
          # [PERBAIKAN PACKAGE NAME]: Memisahkan Package Name dari user agar sesuai standar Native Android Flutter
          ORG_NAME="${USER_PKG%.*}"
          APP_DIR_NAME="${USER_PKG##*.}"
          if [ "$ORG_NAME" == "$APP_DIR_NAME" ]; then ORG_NAME="com"; fi
          
          # Membersihkan nama app agar valid menurut standar Dart
          DART_PKG_NAME=$(echo "$APP_DIR_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]/_/g')
          
          # Menginjeksi nama Dart yang benar ke pubspec.yaml
          sed -i -E "s/^name: .*/name: $DART_PKG_NAME/g" pubspec.yaml
          
          rm -rf android
          
          # Render ulang Android Manifest menggunakan parameter org yang dinamis!
          flutter create --platforms=android --org "$ORG_NAME" . > /dev/null 2>&1
          flutter pub get > /dev/null 2>&1

      - name: Deep Identity Injection & Icon Cache-Buster
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Manifest] Injecting Identity & Locking stable SDK dependencies...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          
          RES_DIR="android/app/src/main/res"
          
          sudo apt-get install -y imagemagick > /dev/null 2>&1 || true
          mkdir -p temp_icon
          curl -sL "${{ inputs.iconUrl }}" -o temp_icon/icon.png > /dev/null 2>&1
          if [ ! -s temp_icon/icon.png ]; then echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > temp_icon/icon.png; fi
          
          for SIZE in "48 mdpi" "72 hdpi" "96 xhdpi" "144 xxhdpi" "192 xxxhdpi"; do
            set -- $SIZE
            S=$1; DENS=$2
            DIR="$RES_DIR/mipmap-$DENS"
            mkdir -p "$DIR"
            convert temp_icon/icon.png -resize ${S}x${S} "$DIR/ic_launcher.png" || cp temp_icon/icon.png "$DIR/ic_launcher.png"
            convert temp_icon/icon.png -resize ${S}x${S} "$DIR/ic_launcher_round.png" || cp temp_icon/icon.png "$DIR/ic_launcher_round.png"
          done
          
          find android/app/src/main -type f -name "AndroidManifest.xml" -exec sed -i 's|android:label="[^"]*"|android:label="${{ inputs.appName }}"|g' {} + || true
          
          echo "flutter.minSdkVersion=${{ inputs.minSdk }}" >> android/local.properties
          echo "flutter.targetSdkVersion=${{ inputs.targetSdk }}" >> android/local.properties
          
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseParallelGC" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties

      - name: Turbo Release Compiler (With Safe Log Catcher)
        env:
          VER_NAME: ${{ inputs.versionName }}
          VER_CODE: ${{ inputs.versionCode }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Compiler] Executing Native Flutter Engine (Release Mode)...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            flutter build appbundle --release --build-name=$VER_NAME --build-number=$VER_CODE > build_log.txt 2>&1 || export BUILD_FAILED=1
          else
            flutter build apk --release --build-name=$VER_NAME --build-number=$VER_CODE > build_log.txt 2>&1 || export BUILD_FAILED=1
          fi
          
          if [ "$BUILD_FAILED" == "1" ]; then
            ERROR_MSG=$(grep -A 30 -E "FAILURE:|Exception:|What went wrong:|error: |Could not resolve" build_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g' || echo "")
            if [ -z "$ERROR_MSG" ]; then ERROR_MSG=$(tail -n 30 build_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g'); fi
            jq -n --arg id "${{ inputs.id }}" --arg log "[BUILD FAILED] Terdapat kesalahan kompilasi Flutter/Gradle:
            
          $ERROR_MSG" '{"id": $id, "log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            exit 1
          fi

      - name: Artifact Signer & Delivery
        if: success()
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Signer] Applying AES-256 App Signature & Uploading...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          SAFE_APP_NAME=$(echo "${{ inputs.appName }}" | sed 's/[^a-zA-Z0-9]/_/g')
          
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            FILE_PATH=$(find app/build/app/outputs/bundle -name "*.aab" | grep release | head -n 1)
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$FILE_PATH" appstudio > /dev/null 2>&1
            mv "$FILE_PATH" "${SAFE_APP_NAME}.aab"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.aab" "${{ inputs.uploadUrl }}&ext=aab" > /dev/null || true
          else
            FILE_PATH=$(find app/build/app/outputs/flutter-apk -name "*.apk" | grep release | head -n 1)
            $ZIPALIGN -p -f -v 4 "$FILE_PATH" aligned.apk > /dev/null 2>&1
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk > /dev/null 2>&1
            mv aligned.apk "${SAFE_APP_NAME}.apk"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null || true
          fi

      - name: Finalize Status
        if: always()
        run: |
          STATUS="failed"
          if [ "${{ job.status }}" == "success" ]; then STATUS="success"; fi
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"$STATUS\"}" "${{ inputs.webhookUrl }}" > /dev/null || true
